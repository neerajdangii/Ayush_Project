{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{ document_title }} | {{ report.booking.sample_reg_no }}</title>
  <link rel="stylesheet" href="{% static 'css/coa.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="coa-standalone">
  {% block toolbar %}{% endblock %}
  <div class="coa-print-page">
    {% include 'reports/partials/coa_letterhead.html' %}
  </div>
  {% block extra_js %}
  {% if not qr_image_data %}
  <script src="{% static 'js/qrcode.min.js' %}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const qrTargets = document.querySelectorAll('#coa-qr-code, .coa-qr-code');
      if (!qrTargets.length || !window.QRCode) {
        return;
      }

      qrTargets.forEach((target) => {
        const payload = target.dataset.qrPayload || '{{ qr_payload|escapejs }}';
        if (!payload) {
          return;
        }
        target.innerHTML = '';
        new QRCode(target, {
          text: payload,
          width: 90,
          height: 90
        });
      });
    });
  </script>
  {% endif %}
  <script src="{% static 'js/coa_paginate.js' %}"></script>
  {% endblock %}
</body>
</html>
